<div class="auth-page">
  <div class="auth-card glass-card animate-fadeIn">
    <div class="auth-header">
      <span class="auth-icon">🚀</span>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join NexStore today</p>
    </div>

    <div class="auth-error" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="register()">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" [(ngModel)]="name" name="name" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" [(ngModel)]="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" [(ngModel)]="password" name="password" placeholder="Min. 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-lg auth-btn" [disabled]="loading">
        {{ loading ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Sign In</a>
    </p>
  </div>
</div>
