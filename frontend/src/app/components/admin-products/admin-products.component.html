<div class="admin-page container">
  <div class="page-header">
    <h1 class="page-title">Admin Dashboard: Products</h1>
    <button class="btn btn-primary" (click)="openNewForm()">+ Add Product</button>
  </div>

  <div class="admin-content">
    <!-- Form Sidebar -->
    <div class="admin-form glass-card animate-fadeIn" *ngIf="showForm">
      <h2>{{ editingProduct ? 'Edit Product' : 'New Product' }}</h2>

      <form (ngSubmit)="saveProduct()">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" class="form-input" [(ngModel)]="editingProduct ? editingProduct.name : newProduct.name" name="name" required>
        </div>
        
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Category</label>
            <input type="text" class="form-input" [(ngModel)]="editingProduct ? editingProduct.category : newProduct.category" name="category" required>
          </div>
          <div class="form-group">
            <label class="form-label">Price ($)</label>
            <input type="number" step="0.01" class="form-input" [(ngModel)]="editingProduct ? editingProduct.price : newProduct.price" name="price" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Image URL</label>
          <input type="url" class="form-input" [(ngModel)]="editingProduct ? editingProduct.imageUrl : newProduct.imageUrl" name="imageUrl" required>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Stock Quantity</label>
            <input type="number" class="form-input" [(ngModel)]="editingProduct ? editingProduct.stockQuantity : newProduct.stockQuantity" name="stock" required>
          </div>
          <div class="form-group checkbox-group">
            <label class="form-label">Featured</label>
            <input type="checkbox" [(ngModel)]="editingProduct ? editingProduct.featured : newProduct.featured" name="featured">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea rows="4" class="form-input" [(ngModel)]="editingProduct ? editingProduct.description : newProduct.description" name="description" required></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" (click)="cancelForm()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </div>
      </form>
    </div>

    <!-- Product List -->
    <div class="admin-list" [class.shrink]="showForm">
      <div class="table-container glass-card">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Product</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let product of products">
              <td>#{{ product.id }}</td>
              <td>
                <div class="table-product">
                  <img [src]="product.imageUrl" class="table-img" (error)="product.imageUrl = 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=50'">
                  <span>{{ product.name }}</span>
                </div>
              </td>
              <td><span class="badge">{{ product.category }}</span></td>
              <td>${{ product.price | number:'1.2-2' }}</td>
              <td>
                <span [class.text-danger]="product.stockQuantity < 10">{{ product.stockQuantity }}</span>
              </td>
              <td class="table-actions">
                <button class="action-btn edit-btn" (click)="editProduct(product)">✎</button>
                <button class="action-btn delete-btn" (click)="deleteProduct(product.id)">🗑</button>
              </td>
            </tr>
            <tr *ngIf="loading">
              <td colspan="6" class="text-center py-4">Loading products...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
