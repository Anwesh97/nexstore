<div class="auth-page">
  <div class="auth-card glass-card animate-fadeIn">
    <div class="auth-header">
      <span class="auth-icon">👋</span>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your NexStore account</p>
    </div>

    <div class="auth-error" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="login()">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" [(ngModel)]="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" [(ngModel)]="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg auth-btn" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Sign Up</a>
    </p>
  </div>
</div>
